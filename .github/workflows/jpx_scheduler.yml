name: JPX Options Data Automator

on:
  schedule:
    # 毎日日本時間 21:00 (UTC 12:00) に実行
    - cron: '00 12 * * *'
  workflow_dispatch: # ボタンを押して手動で今すぐ実行することも可能にする設定

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: コードのチェックアウト
      uses: actions/checkout@v4

    - name: Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 必要なライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl gspread google-auth

    - name: スクリプトの実行
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: python main.py